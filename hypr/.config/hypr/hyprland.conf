# =============================================================================
# hyprland.conf — migrated from AwesomeWM
# =============================================================================

# -----------------------------------------------------------------------------
# Monitor
# -----------------------------------------------------------------------------
monitor = eDP-2,2560x1600@240,0x0,1.33
xwayland {
    force_zero_scaling = true
}

# -----------------------------------------------------------------------------
# NVIDIA hybrid laptop env vars
# -----------------------------------------------------------------------------
env = LIBVA_DRIVER_NAME,nvidia
env = __GLX_VENDOR_LIBRARY_NAME,nvidia
env = GBM_BACKEND,nvidia-drm
env = __NV_PRIME_RENDER_OFFLOAD,1
env = WLR_NO_HARDWARE_CURSORS,1
env = ELECTRON_OZONE_PLATFORM_HINT,auto
env = MOZ_ENABLE_WAYLAND,1
env = QT_QPA_PLATFORM,wayland
env = QT_WAYLAND_DISABLE_WINDOWDECORATION,1
env = SDL_VIDEODRIVER,wayland
env = CLUTTER_BACKEND,wayland
env = XDG_SESSION_TYPE,wayland
env = XDG_CURRENT_DESKTOP,Hyprland
env = XDG_SESSION_DESKTOP,Hyprland
env = HYPRCURSOR_THEME,Bibata-Original-Ice


# -----------------------------------------------------------------------------
# Autostart
# -----------------------------------------------------------------------------
exec-once = waypaper --restore
exec-once = waybar
exec-once = wl-paste --type text --watch cliphist store
exec-once = wl-paste --type image --watch cliphist store
exec-once = nm-applet --indicator
exec-once = blueman-applet
exec-once = lxqt-policykit-agent
exec-once = emacs --daemon
exec-once = brave --no-startup-window
exec-once = helium-browser --no-startup-window --password-store=basic
exec-once = sh -c 'pkill localsend; flatpak run org.localsend.localsend_app --hidden'
exec-once = dunst
exec-once = swayidle -w timeout 300 'swaylock -f --color 242430' timeout 600 'hyprctl dispatch dpms off' resume 'hyprctl dispatch dpms on' before-sleep 'swaylock -f --image ~/.config/wall.png'


# -----------------------------------------------------------------------------
# General
# -----------------------------------------------------------------------------
general {
    gaps_in = 3
    gaps_out = 3
    border_size = 4
    col.active_border = rgba(6e94b2ff)
    col.inactive_border = rgba(000000ff)
    layout = master
}


# -----------------------------------------------------------------------------
# Master layout
# new_status = slave: new windows open in stack, not master (matches AwesomeWM)
# -----------------------------------------------------------------------------
master {
    new_status = slave
    mfact = 0.55
}

scrolling {
    column_width = 1
}


# -----------------------------------------------------------------------------
# Input — sloppy focus (matches AwesomeWM mouse::enter signals)
# -----------------------------------------------------------------------------
input {
    kb_layout = us
    follow_mouse = 0
    numlock_by_default = true
    mouse_refocus = false
}


# -----------------------------------------------------------------------------
# Cursor — warp to window center on focus (matches signals.lua behavior)
# -----------------------------------------------------------------------------
cursor {
    no_warps = false
}


# -----------------------------------------------------------------------------
# Decoration — minimal, no blur, no shadows, no opacity overrides
# Apps (e.g. alacritty) control their own opacity (mirrors picom inactive-opacity-override=false)
# -----------------------------------------------------------------------------
decoration {
    rounding = 4

    active_opacity = 1.0
    inactive_opacity = 1.0
    fullscreen_opacity = 1.0

    shadow {
        enabled = false
    }

    blur {
        enabled = false
    }
}


# -----------------------------------------------------------------------------
# Animations — disabled
# -----------------------------------------------------------------------------
animations {
    enabled = false
}


# -----------------------------------------------------------------------------
# Misc
# -----------------------------------------------------------------------------
misc {
    disable_hyprland_logo = true
    disable_splash_rendering = true
    focus_on_activate = true
}


# -----------------------------------------------------------------------------
# Workspace rules
# Workspace 6 uses monocle (equivalent to AwesomeWM max layout)
# -----------------------------------------------------------------------------
workspace = 6, layout:monocle
workspace = 7, layout:scrolling


# -----------------------------------------------------------------------------
# Window rules
# -----------------------------------------------------------------------------
windowrule {
    name = zathura-tile
    match:class = org.pwmt.zathura
    tile = 1
}

windowrule {
    name = arandr-float
    match:class = Arandr
    float = 1
}
windowrule {
    name = lxqt-policykit-agent
    match:class = lxqt-policykit-agent
    float = 1
}
windowrule {
    name = blueman-float
    match:class = Blueman-manager
    float = 1
}

windowrule {
    name = gpick-float
    match:class = Gpick
    float = 1
}

windowrule {
    name = kruler-float
    match:class = Kruler
    float = 1
}

windowrule {
    name = veracrypt-float
    match:class = veracrypt
    float = 1
}

windowrule {
    name = event-tester-float
    match:title = Event Tester
    float = 1
}

windowrule {
    name = copyq-float
    match:class = copyq
    float = 1
}


# nmtui-go: floating, centered, pinned on top
windowrule {
    name = nmtui-go-float
    match:title = nmtui-go
    float = 1
    center = 1
    pin = 1
    size = 800 500
}


# -----------------------------------------------------------------------------
# Keybindings
# -----------------------------------------------------------------------------

# --- Workspace navigation ---
bind = SUPER, left,  workspace, e-1
bind = SUPER, right, workspace, e+1
bind = SUPER, escape, workspace, previous

bind = SUPER, 1, workspace, 1
bind = SUPER, 2, workspace, 2
bind = SUPER, 3, workspace, 3
bind = SUPER, 4, workspace, 4
bind = SUPER, 5, workspace, 5
bind = SUPER, 6, workspace, 6
bind = SUPER, 7, workspace, 7
bind = SUPER, 8, workspace, 8
bind = SUPER, 9, workspace, 9

bind = SUPER SHIFT, 1, movetoworkspace, 1
bind = SUPER SHIFT, 2, movetoworkspace, 2
bind = SUPER SHIFT, 3, movetoworkspace, 3
bind = SUPER SHIFT, 4, movetoworkspace, 4
bind = SUPER SHIFT, 5, movetoworkspace, 5
bind = SUPER SHIFT, 6, movetoworkspace, 6
bind = SUPER SHIFT, 7, movetoworkspace, 7
bind = SUPER SHIFT, 8, movetoworkspace, 8
bind = SUPER SHIFT, 9, movetoworkspace, 9

# --- Window focus (vim-style) ---
bind = SUPER, h, movefocus, l
bind = SUPER, l, movefocus, r
bind = SUPER, j, movefocus, d
bind = SUPER, k, movefocus, u
bind = ALT, Tab,       layoutmsg,cyclenext
bind = ALT SHIFT, Tab, layoutmsg,cycleprev
bind = SUPER, Tab,     focuscurrentorlast

# --- Window swapping ---
bind = SUPER SHIFT, h, swapwindow, l
bind = SUPER SHIFT, l, swapwindow, r
bind = SUPER SHIFT, j, swapwindow, d
bind = SUPER SHIFT, k, swapwindow, u

# --- Layout resizing ---
bind = SUPER ALT, l,       layoutmsg, mfact +0.03
bind = SUPER ALT, h,       layoutmsg, mfact -0.03
bind = SUPER ALT SHIFT, h, layoutmsg, addmaster
bind = SUPER ALT SHIFT, l, layoutmsg, removemaster
bind = SUPER ALT, j,       splitratio, -0.03
bind = SUPER ALT, k,       splitratio, +0.03

# --- Layout cycling ---
bind = SUPER SHIFT, space, layoutmsg, orientationnext

# --- Window actions ---
bind = SUPER SHIFT, f,     fullscreen, 0
bind = ALT, q,             killactive
bind = SUPER, f,           togglefloating
bind = SUPER CTRL, return, layoutmsg, swapwithmaster
bind = SUPER, t,           pin
bind = SUPER, m,           fullscreen, 1

# --- Program launchers ---
bind = SUPER, return,       exec, alacritty
bind = SUPER SHIFT, return, exec, brave
bind = ALT, space,          exec, rofi -show drun
bind = SUPER, space,        exec, /home/dhyey/.script/rofi-fzf.sh
bind = SUPER, w,            exec, /home/dhyey/.script/web-search.sh
bind = SUPER, e,      exec, pcmanfm-qt
bind = SUPER SHIFT, b,      exec, helium-browser --profile-directory='Profile 1'
bind = ALT SHIFT, space,    exec, /home/dhyey/.script/powermenu.sh

# --- Clipboard ---
bind = SUPER, v,       exec, /home/dhyey/.script/rofi-clip_wl.sh
bind = SUPER SHIFT, v, exec, cliphist wipe

# --- Screenshot (uses grimblast, see change.md) ---
bind = SUPER, s,       exec, /home/dhyey/.script/scrot_wl.sh
bind = SUPER SHIFT, s,       exec, hyprshot -m region --raw | satty --filename -
bind = SUPER SHIFT, p, exec, /home/dhyey/.script/scrot-full_wl.sh

# --- Color picker ---
bind = SUPER SHIFT, c, exec, hyprpicker | wl-copy

# --- Volume ---
bind   = SUPER, F1, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bind   = SUPER, F2, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bind   = SUPER, F3, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%+
bindel = , XF86AudioMute,        exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bindel = , XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bindel = , XF86AudioRaiseVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%+
bind   = ALT SHIFT, v, exec, alacritty -e wiremix -v output

# --- Emoji, WiFi, Wallpaper, Misc ---
bind = SUPER, comma,   exec, rofi -show emoji -modi emoji
bind = SUPER, semicolon,   exec, rofi -show calc -modi calc -no-show-match -no-sort
bind = SUPER SHIFT, w, exec, alacritty -e nmtui-go
bind = ALT CTRL, r,    exec, hyprctl reload

# --- Move/resize with mouse ---
bindm = SUPER, mouse:272, movewindow
bindm = SUPER, mouse:273, resizewindow
