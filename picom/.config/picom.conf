# Minimal picom config — compositing only, no effects

backend = "glx";
vsync = true;

# No shadows
shadow = false;

# No fading
fading = false;

# No blur
blur-method = "none";

# No dimming
inactive-dim = 0;

# Opacity — allows Alacritty (and any app) to use its own opacity setting
inactive-opacity = 1.0;
active-opacity = 1.0;
frame-opacity = 1.0;
inactive-opacity-override = false;
